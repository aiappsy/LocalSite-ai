services:
  localsite-ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Default provider configuration
      - DEFAULT_PROVIDER=deepseek
    extra_hosts:
      - "host.docker.internal:host-gateway"